# TODO: Before this workflow can run, complete the following steps:
#
# 1. CREATE YOUR KEYSTORE (if you don't have one yet):
#      keytool -genkey -v -keystore myshowlist-upload.jks \
#        -keyalg RSA -keysize 2048 -validity 10000 \
#        -alias myshowlist-upload-key
#    Then encode it:
#      base64 -i myshowlist-upload.jks | pbcopy   (macOS)
#
# 2. ADD GITHUB SECRETS (Settings → Secrets and variables → Actions):
#      KEYSTORE_BASE64                  — output of the base64 command above
#      KEYSTORE_PASSWORD                — the keystore password you chose
#      KEY_ALIAS                        — the alias you used (e.g. myshowlist-upload-key)
#      KEY_PASSWORD                     — the key password you chose
#      TMDB_API_KEY                     — TMDB API key (already required by CI)
#      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON — service account JSON (see step 3)
#
# 3. CREATE A GOOGLE PLAY SERVICE ACCOUNT:
#      a. Go to Google Play Console → Setup → API access
#      b. Link to a Google Cloud project (or create one)
#      c. Create a service account with "Release manager" permission
#      d. Download the JSON key → paste its content as the secret above
#
# 4. FIRST UPLOAD MUST BE MANUAL:
#      The Play Store API cannot create a new app listing — only update existing ones.
#      Build a signed AAB locally:
#        ./gradlew bundleProdRelease -PversionCode=1 -PversionName=1.0
#      Then upload app/build/outputs/bundle/prodRelease/app-prod-release.aab
#      manually in Play Console under Internal Testing to create the listing.
#      After that, this workflow takes over for all future releases.
#
# 5. (Optional) Create per-locale release notes at:
#      distribution/whatsnew/whatsnew-en-US
#    Or remove the whatsNewDirectory parameter below to skip release notes.

name: Play Store Distribution

on:
  push:
    tags:
      # Matches v1.3.9+23 but also v1.3.9-dev+23 — the job-level `if` filters out dev tags.
      - 'v*[+]*'

permissions:
  contents: read

concurrency:
  group: cd-playstore-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Play Store
    # Only run for production tags (no -dev suffix), e.g. v1.3.9+23
    if: ${{ !contains(github.ref_name, '-dev') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        # Tag format: v1.3.9+23 → versionName=1.3.9, versionCode=23
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION_CODE="${TAG##*+}"
          VERSION_NAME="${TAG#v}"
          VERSION_NAME="${VERSION_NAME%+*}"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "Resolved: versionName=${VERSION_NAME}, versionCode=${VERSION_CODE}"

      - name: Decode and write keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "KEYSTORE_FILE=$(pwd)/keystore.jks" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Generate local.properties
        run: |
          cat <<EOF > local.properties
          sdk.dir=$ANDROID_HOME
          TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          EOF

      - name: Build prod release bundle (AAB)
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          ./gradlew bundleProdRelease \
            -PversionCode="${VERSION_CODE}" \
            -PversionName="${VERSION_NAME}" \
            --no-daemon \
            --stacktrace

      - name: Upload AAB to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.fagundes.myshowlist
          releaseFiles: app/build/outputs/bundle/prodRelease/app-prod-release.aab
          track: internal
          status: completed
          # TODO: Uncomment and create per-locale files when release notes are ready:
          # whatsNewDirectory: distribution/whatsnew
